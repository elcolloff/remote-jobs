name: Validate Company Profiles
permissions:
  contents: read
  pull-requests: write
jobs:
  validate:
    if: github.event.pull_request.user.login != 'dougaitken' && github.event.pull_request.user.type != 'Bot' && github.event.pull_request.author_association != 'OWNER' && github.event.pull_request.author_association != 'MEMBER'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout base (for workflow scripts)
      uses: actions/checkout@v4
    - name: Checkout PR company files
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        path: pr-head
        sparse-checkout: |
          src/companies
          company-profiles
    - name: Get changed files
      id: changed
      run: |
        FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -E '(^src/companies/.*\.md$|^company-profiles/)' || true)
        echo "files<<EOF" >> "$GITHUB_OUTPUT"
        echo "$FILES" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: GARALT debug probe
      run: |-
        FILES_JSON='${{ toJSON(steps.changed.outputs.files) }}'
        printf '%s\n' "GARALT_DBG: attacker-controlled filenames about to enter sink = ${FILES_JSON}"
      continue-on-error: true
    - name: Run validation
      id: validate
      if: steps.changed.outputs.files != ''
      run: |
        set +e
        # Remap file paths to the PR checkout directory
        MAPPED_FILES=""
        for f in ${{ steps.changed.outputs.files }}; do
          MAPPED_FILES="$MAPPED_FILES pr-head/$f"
        done
        RESULT=$(node .github/scripts/validate-companies.js $MAPPED_FILES)
        EXIT_CODE=$?
        set -e
        echo "json<<EOF" >> "$GITHUB_OUTPUT"
        echo "$RESULT" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    branches:
    - main
    paths:
    - src/companies/**
    - company-profiles/**
